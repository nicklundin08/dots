version: '3'
includes:
  ssh: ./tasks/Taskfile.ssh.yaml
  fmt: ./tasks/Taskfile.fmt.yaml
  wg: ./tasks/Taskfile.wg.yaml
tasks:
  default:
    cmds:
      - task --list-all
  repl:
    cmds:
      - echo "type :q to exit"
      - nix repl --extra-experimental-features 'flakes repl-flake' nixpkgs
  branch:create:
    cmds:
      - git switch -c $DOTS_BRANCH_NAME || true
      - git switch $DOTS_BRANCH_NAME
      - git push -u origin $DOTS_BRANCH_NAME
      - git switch main
  branch:pull:
    cmds:
      - git switch $DOTS_BRANCH_NAME
      - git merge --ff main
      - task: rebuild
      - git push
      - git switch main
      - exec bash
  rebuild:
    cmds:
      - dots:rebuild
  update:
    cmds:
      - nix flake update
  gc:
    cmds:
      - nix-collect-garbage
  rrr:
    # rebase-rebuild-push
    cmds:
      - git checkout main
      - git pull --rebase
      - task: rebuild
      - git push
      - git switch $DOTS_BRANCH_NAME
      - git merge --ff main
      - git push
      - git switch main
      - lazygit
  increment:
    cmds:
      - lazygit
      - cz commit
      - task: rrr
